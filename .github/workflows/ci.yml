name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ---------------------------------------------------------------
  # Build and test on multiple platforms
  # ---------------------------------------------------------------
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests
        run: ctest --test-dir build --output-on-failure -V

  # ---------------------------------------------------------------
  # Static analysis with cppcheck
  # ---------------------------------------------------------------
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck --enable=warning,style,performance \
                   --error-exitcode=1                 \
                   --suppress=missingIncludeSystem    \
                   -I src                             \
                   src/

  # ---------------------------------------------------------------
  # Release: triggered by version tags (e.g. v1.0.0)
  # ---------------------------------------------------------------
  release:
    name: Release (Linux binary)
    runs-on: ubuntu-latest
    needs: [build-and-test, static-analysis]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential

      - name: Build release binary
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=OFF
          cmake --build build --parallel

      - name: Create archive
        run: |
          mkdir -p dist
          cp build/library dist/
          cp -r data dist/
          cp README.md LICENSE dist/
          tar -czf c-library-system-${{ github.ref_name }}-linux-x86_64.tar.gz -C dist .

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: c-library-system-*.tar.gz
          generate_release_notes: true
