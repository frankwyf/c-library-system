name: Feature Request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature!
        Please check [open issues](../../issues) first to avoid duplicates.

  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear description of the limitation or gap you've encountered.
      placeholder: "e.g. It is frustrating when I cannot search for a book by title …"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: What should the new behaviour look like from a user's perspective?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you have considered or tried.

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Mockups, references to similar projects, or any other useful information.
