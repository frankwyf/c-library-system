name: Bug Report
description: Report a defect or unexpected behaviour
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to file a bug report.
        Please fill out as much detail as possible to help us reproduce and fix the issue quickly.

  - type: input
    id: version
    attributes:
      label: Version / Commit
      description: Run `git describe --tags --always` or paste the release tag.
      placeholder: "e.g. v1.0.0 or abc1234"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true

  - type: input
    id: compiler
    attributes:
      label: Compiler & Version
      placeholder: "e.g. GCC 13.2 / Clang 17 / MSVC 19.38"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Build with `cmake -B build && cmake --build build`
        2. Run `./build/library data/books.txt`
        3. Select option …
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Stack traces, screenshots, or any other relevant information.
